name: Renovate

on:
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Check token configuration
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if [ -z "${RENOVATE_TOKEN}" ]; then
            echo "RENOVATE_TOKEN secret is not configured." >&2
            echo "Create a repository secret named RENOVATE_TOKEN so Renovate can authenticate and open pull requests." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
