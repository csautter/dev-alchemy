name: Test Packer Build on Windows for VMs

permissions:
  actions: write
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      enable_az_hyperv:
        description: 'Enable AzureHyperV jobs (provision + test + cleanup)'
        required: false
        default: true
        type: boolean
      enable_az_virtualbox:
        description: 'Enable Azure VirtualBox jobs (provision + test + cleanup)'
        required: false
        default: true
        type: boolean
  pull_request:
    paths:
      - "build/packer/windows/*"
      - "build/packer/windows/**/*"
      - ".github/workflows/test-build-windows.yml"

jobs:
  provision-hyperv-runner:
    if: ${{ github.event_name == 'pull_request' || inputs.enable_az_hyperv }}
    runs-on: ubuntu-latest
    outputs:
      runner-name: ${{ steps.vars.outputs.runner-name }}
      resource-group: ${{ steps.vars.outputs.resource-group }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate names
        id: vars
        run: |
          echo "runner-name=${GITHUB_RUN_ID}-hv" >> $GITHUB_OUTPUT
          echo "resource-group=gh-runner-tmp-${GITHUB_RUN_ID}-hv" >> $GITHUB_OUTPUT

      - name: Request Windows Runner VM
        run: |
          echo "Creating Windows VM in resource group ${{ steps.vars.outputs.resource-group }} with runner name ${{ steps.vars.outputs.runner-name }}"
          az rest \
            --method post \
            --uri "https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/request_runner" \
            --resource "api://${{ secrets.AZURE_CLIENT_ID }}" \
            --body '{
              "repo": "${{ github.repository }}",
              "resource-group": "${{ steps.vars.outputs.resource-group }}",
              "runner-name": "${{ steps.vars.outputs.runner-name }}",
              "virtualization-flavor": "hyperv"
            }'

  provision-virtualbox-runner:
    # if: ${{ github.event_name == 'pull_request' || inputs.enable_az_virtualbox }}
    # TODO: Re-enable after fixing VirtualBox provisioning issue
    if: false 
    runs-on: ubuntu-latest
    outputs:
      runner-name: ${{ steps.vars.outputs.runner-name }}
      resource-group: ${{ steps.vars.outputs.resource-group }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate names
        id: vars
        run: |
          echo "runner-name=${GITHUB_RUN_ID}-vb" >> $GITHUB_OUTPUT
          echo "resource-group=gh-runner-tmp-${GITHUB_RUN_ID}-vb" >> $GITHUB_OUTPUT

      - name: Request Windows Runner VM
        run: |
          echo "Creating Windows VM in resource group ${{ steps.vars.outputs.resource-group }} with runner name ${{ steps.vars.outputs.runner-name }}"
          az rest \
            --method post \
            --uri "https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/request_runner" \
            --resource "api://${{ secrets.AZURE_CLIENT_ID }}" \
            --body '{
              "repo": "${{ github.repository }}",
              "resource-group": "${{ steps.vars.outputs.resource-group }}",
              "runner-name": "${{ steps.vars.outputs.runner-name }}",
              "virtualization-flavor": "virtualbox"
            }'

  test-hyperv-build:
    if: ${{ github.event_name == 'pull_request' || inputs.enable_az_hyperv }}
    name: build TestBuildHypervWindows11Amd64OnWindows
    needs: [provision-hyperv-runner]
    timeout-minutes: 60
    env:
      PACKER_TEMP_PATH: "D:\\hyperv-temp" # Use Azure VM temp disk for packer temp files to speed up build
    runs-on:
      - self-hosted
      - Windows
      - azure
      - nested
      - "${{ needs.provision-hyperv-runner.outputs.runner-name }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download build cache files
        uses: ./.github/actions/download-build-cache
        with:
          files: '[{"local-path":"./cache/windows11/iso/win11_25h2_english_amd64.iso","container":"build-cache"}]'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies windows
        shell: powershell
        run: |
          $oscdimgPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter oscdimg.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $oscdimgPath) {
            echo "oscdimg.exe not found. Installing..."
            powershell -File scripts/windows/install_oscdimg.ps1
          }
          $oscdimgPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter oscdimg.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          echo "$oscdimgPath"
          echo "$($oscdimgPath | Split-Path)" | Out-File -Append $env:GITHUB_PATH

      - name: Run HyperV build
        id: packer_build
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          PACKER_LOG: 1
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go mod vendor
          make test-build-specific TEST_NAME=TestBuildHypervWindows11Amd64OnWindows

      - name: Run HyperV deploy smoke test
        if: steps.packer_build.outcome == 'success'
        id: deploy_smoke
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          RUN_WINDOWS_HYPERV_DEPLOY_SMOKE: "1"
        run: |
          go test -timeout 60m -v ./pkg/deploy -run "^TestRunHypervVagrantDeployOnWindows_Smoke$"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload build cache files
        uses: ./.github/actions/upload-build-cache
        with:
          files: '[{"local-path":"./cache/windows11/iso/win11_25h2_english_amd64.iso","container":"build-cache"}]'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fail if build or deploy smoke test failed
        if: always() && (steps.packer_build.outcome == 'failure' || steps.deploy_smoke.outcome == 'failure')
        run: |
          echo "Build and/or deploy smoke test failed. Failing workflow."
          exit 1

  watch-hyperv-runner-queue:
    if: ${{ github.event_name == 'pull_request' || inputs.enable_az_hyperv }}
    name: watch HyperV runner queue
    needs: [provision-hyperv-runner]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for HyperV build job to leave queue
        env:
          GH_TOKEN: ${{ github.token }}
          POLL_INTERVAL_SECONDS: "30"
          REPO: ${{ github.repository }}
          RESOURCE_GROUP: ${{ needs.provision-hyperv-runner.outputs.resource-group }}
          RUN_ID: ${{ github.run_id }}
          RUNNER_NAME: ${{ needs.provision-hyperv-runner.outputs.runner-name }}
          TARGET_JOB_NAME: "build TestBuildHypervWindows11Amd64OnWindows"
          WAIT_TIMEOUT_SECONDS: "900"
        run: |
          deadline=$(( $(date +%s) + WAIT_TIMEOUT_SECONDS ))
          github_api_version="2022-11-28"

          while true; do
            now=$(date +%s)
            jobs_json="$(
              curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: ${github_api_version}" \
                "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100"
            )"
            job_state="$(
              TARGET_JOB_NAME="${TARGET_JOB_NAME}" python3 -c 'import json, os, sys; target_name = os.environ["TARGET_JOB_NAME"]; match = next((job for job in json.load(sys.stdin).get("jobs", []) if job.get("name") == target_name), None); print((match.get("status", "") if match else "") + "\t" + ((match.get("conclusion") or "") if match else ""))' <<< "${jobs_json}"
            )"
            IFS=$'\t' read -r job_status job_conclusion <<< "${job_state}"

            if [[ -n "${job_status}" ]]; then
              echo "Observed ${TARGET_JOB_NAME}: status=${job_status} conclusion=${job_conclusion:-none}"
            else
              echo "Waiting for ${TARGET_JOB_NAME} to appear in workflow jobs list"
            fi

            if [[ "${job_status}" == "in_progress" || "${job_status}" == "completed" ]]; then
              echo "${TARGET_JOB_NAME} has left the queue"
              exit 0
            fi

            if (( now >= deadline )); then
              echo "${TARGET_JOB_NAME} stayed queued too long. Deleting ${RESOURCE_GROUP} and force-canceling workflow run ${RUN_ID}."

              az rest \
                --method post \
                --uri "https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/delete_resource_group" \
                --resource "api://${{ secrets.AZURE_CLIENT_ID }}" \
                --body "{
                  \"resource-group\": \"${RESOURCE_GROUP}\",
                  \"runner-name\": \"${RUNNER_NAME}\"
                }" || echo "Failed to delete resource group, continuing with force-cancel..."

              curl -fsSL \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: ${github_api_version}" \
                "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/force-cancel" >/dev/null || \
              curl -fsSL \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: ${github_api_version}" \
                "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/cancel" >/dev/null || true

              exit 1
            fi

            sleep "${POLL_INTERVAL_SECONDS}"
          done

  test-virtualbox-build:
    # if: ${{ github.event_name == 'pull_request' || inputs.enable_az_virtualbox }}
    # TODO: Re-enable after fixing VirtualBox provisioning issue
    if: false 
    name: build TestBuildVirtualBoxWindows11Amd64OnWindows
    needs: [provision-virtualbox-runner]
    timeout-minutes: 80
    env:
      PACKER_TEMP_PATH: "D:\\vbox-temp" # Use Azure VM temp disk for packer temp files to speed up build
    runs-on:
      - self-hosted
      - Windows
      - azure
      - nested
      - "${{ needs.provision-virtualbox-runner.outputs.runner-name }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download build cache files
        uses: ./.github/actions/download-build-cache
        with:
          files: '[{"local-path":"./cache/windows11/iso/win11_25h2_english_amd64.iso","container":"build-cache"}]'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies windows
        shell: powershell
        run: |
          $oscdimgPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter oscdimg.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $oscdimgPath) {
            echo "oscdimg.exe not found. Installing..."
            powershell -File scripts/windows/install_oscdimg.ps1
          }
          $oscdimgPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter oscdimg.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          echo "$oscdimgPath"
          echo "$($oscdimgPath | Split-Path)" | Out-File -Append $env:GITHUB_PATH

      - name: Run VirtualBox build
        id: packer_build
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          PACKER_LOG: 1
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go mod vendor
          make test-build-specific TEST_NAME=TestBuildVirtualBoxWindows11Amd64OnWindows
          make test-deploy-windows-hyperv

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload build cache files
        uses: ./.github/actions/upload-build-cache
        with:
          files: '[{"local-path":"./cache/windows11/iso/win11_25h2_english_amd64.iso","container":"build-cache"}]'
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fail if Packer build failed
        if: steps.packer_build.outcome == 'failure'
        run: |
          echo "Packer build failed. Failing workflow."
          exit 1

  cleanup-hyperv:
    needs: [provision-hyperv-runner, test-hyperv-build, watch-hyperv-runner-queue]
    if: always() && (github.event_name == 'pull_request' || inputs.enable_az_hyperv)
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete HyperV resource group
        run: |
          echo "Deleting resource group ${{ needs.provision-hyperv-runner.outputs.resource-group }}"
          az rest \
            --method post \
            --uri "https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/delete_resource_group" \
            --resource "api://${{ secrets.AZURE_CLIENT_ID }}" \
            --body "{
              \"resource-group\": \"${{ needs.provision-hyperv-runner.outputs.resource-group }}\",
              \"runner-name\": \"${{ needs.provision-hyperv-runner.outputs.runner-name }}\"
            }" || echo "Failed to delete resource group, continuing..."

  cleanup-virtualbox:
    needs: [provision-virtualbox-runner, test-virtualbox-build]
    # if: always() && (github.event_name == 'pull_request' || inputs.enable_az_virtualbox)
    # TODO: Re-enable after fixing VirtualBox provisioning issue
    if: false 
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete VirtualBox resource group
        run: |
          echo "Deleting resource group ${{ needs.provision-virtualbox-runner.outputs.resource-group }}"
          az rest \
            --method post \
            --uri "https://${{ secrets.FUNCTION_APP_NAME }}.azurewebsites.net/api/delete_resource_group" \
            --resource "api://${{ secrets.AZURE_CLIENT_ID }}" \
            --body "{
              \"resource-group\": \"${{ needs.provision-virtualbox-runner.outputs.resource-group }}\",
              \"runner-name\": \"${{ needs.provision-virtualbox-runner.outputs.runner-name }}\"
            }" || echo "Failed to delete resource group, continuing..."
