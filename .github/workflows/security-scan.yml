name: Security Scan

on:
  push:
    branches:
      - main
    paths:
      - "go.mod"
      - "go.sum"
      - "**/*.go"
      - ".github/workflows/security-scan.yml"
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "**/*.go"
      - ".github/workflows/security-scan.yml"
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # required to upload SARIF results

jobs:
  govulncheck:
    name: Go Vulnerability Check (govulncheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          # Output as SARIF so results appear in the GitHub Security tab
          output-format: sarif
          output-file: govulncheck-results.sarif

      - name: Upload govulncheck SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: govulncheck-results.sarif
          category: govulncheck

  gosec:
    name: Go Static Security Analysis (gosec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Output as SARIF for GitHub Security tab integration.
          # -exclude-generated skips machine-generated files (vendor, etc.)
          args: >-
            -no-fail
            -fmt sarif
            -out gosec-results.sarif
            -exclude-generated
            ./...

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec-results.sarif
          category: gosec
