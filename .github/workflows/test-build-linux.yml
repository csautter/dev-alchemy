name: Test Packer Build on Linux for VMs

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      enable_linux_qemu:
        description: "Enable Linux QEMU builds"
        required: false
        default: true
        type: boolean
  pull_request:
    paths:
      - "cmd/main.go"
      - "cmd/cmd/**"
      - "build/packer/linux/*"
      - "build/packer/linux/**/*"
      - "pkg/build/**"
      - "scripts/linux/*"
      - "scripts/linux/**/*"
      - "scripts/macos/download-arm64-uefi.sh"
      - ".github/workflows/test-build-linux.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-packer-build:
    if: github.event_name == 'pull_request' || inputs.enable_linux_qemu
    name: build ${{ matrix.go_test_name }} runner_os ${{ matrix.runs_on }}
    runs-on: ${{ matrix.runs_on }}
    env:
      DEV_ALCHEMY_APP_DATA_DIR: ${{ github.workspace }}/.dev-alchemy
      DEV_ALCHEMY_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/cache
      DEV_ALCHEMY_VAGRANT_DIR: ${{ github.workspace }}/.dev-alchemy/.vagrant
      DEV_ALCHEMY_PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
    timeout-minutes: 260
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            go_test_name: TestBuildQemuUbuntuServerAmd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuAmd64OnLinux
            runs_on: ubuntu-24.04
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.3-live-server-amd64.iso"}]
          - arch: arm64
            go_test_name: TestBuildQemuUbuntuServerArm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuArm64OnLinux
            runs_on: ubuntu-24.04-arm
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.3-live-server-arm64.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download build cache files
        uses: ./.github/actions/download-build-cache
        with:
          files: ${{ matrix.cache_files }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          local-cache-dir: ""

      - name: Install dependencies linux
        run: |
          go run cmd/main.go install

      - name: Run dependency reconciliation smoke test TEST_NAME=${{ matrix.dependency_test_name }}
        id: dependency_reconciliation
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: |
          go test -timeout 45m -v ./pkg/build -run "^${{ matrix.dependency_test_name }}$"

      - name: Run build for arch=${{ matrix.arch }} TEST_NAME=${{ matrix.go_test_name }} on runner OS=${{ matrix.runs_on }}
        id: packer_build
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          PACKER_LOG: 1
          PACKER_LOG_PATH: ${{ github.workspace }}/artifact/${{ matrix.go_test_name }}.packer.log
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifact
          go mod vendor
          make test-build-specific TEST_NAME=${{ matrix.go_test_name }}

      - name: Move .vnc.mp4 files to artifact directory
        if: always()
        run: |
          mkdir -p artifact
          if [ -d ./.dev-alchemy/cache ]; then
            find ./.dev-alchemy/cache -name '*.vnc.mp4' -exec cp {} artifact/ \;
          fi

      - name: Upload packer log artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-log-${{ matrix.go_test_name }}
          path: artifact/${{ matrix.go_test_name }}.packer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload packer-qemu-ubuntu-${{ matrix.go_test_name }}.vnc.mp4 artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-qemu-ubuntu-${{ matrix.go_test_name }}.vnc.mp4
          path: artifact/*.vnc.mp4
          if-no-files-found: ignore
          retention-days: 1

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload build cache files
        uses: ./.github/actions/upload-build-cache
        with:
          files: ${{ matrix.cache_files }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          local-cache-dir: ""

      - name: Fail if dependency reconciliation or build smoke test failed
        if: always() && (steps.dependency_reconciliation.outcome == 'failure' || steps.packer_build.outcome == 'failure')
        run: |
          echo "Dependency reconciliation and/or build smoke test failed. Failing workflow."
          exit 1
