name: Test Packer Build on Linux for VMs

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      enable_linux_qemu:
        description: "Enable Linux QEMU builds"
        required: false
        default: true
        type: boolean
      hetzner_location:
        description: "Hetzner location for self-hosted Linux runners"
        required: false
        default: "nbg1"
        type: string
      hetzner_image:
        description: "Hetzner image for self-hosted Linux runners"
        required: false
        default: "ubuntu-24.04"
        type: string
      hetzner_runner_version:
        description: "GitHub Actions runner version for self-hosted Linux runners"
        required: false
        default: "latest"
        type: string
      hetzner_amd64_server_type:
        description: "Hetzner server type for amd64 Linux builds"
        required: false
        default: "CPX32"
        type: string
      hetzner_arm64_server_type:
        description: "Hetzner server type for arm64 Linux builds"
        required: false
        default: "cax21"
        type: string
  push:
    branches: [main]
    paths:
      - "cmd/main.go"
      - "cmd/cmd/**"
      - "build/packer/linux/*"
      - "build/packer/linux/**/*"
      - "build/packer/windows/*"
      - "build/packer/windows/**/*"
      - "pkg/build/**"
      - "pkg/deploy/**"
      - "pkg/oci/**"
      - "pkg/provision/**"
      - "scripts/linux/*"
      - "scripts/linux/**/*"
      - "scripts/macos/create-win11-autounattend-iso.sh"
      - "scripts/macos/playwright_win11_iso.py"
      - "scripts/macos/requirements.txt"
      - "scripts/macos/download-arm64-uefi.sh"
      - "scripts/macos/download-utm-guest-tools.sh"
      - "scripts/macos/download-virtio-win-iso.sh"
      - ".github/workflows/test-build-linux.yml"
      - ".github/actions/download-build-cache/**"
      - ".github/actions/hetzner-github-runner/**"
      - ".github/actions/upload-build-cache/**"
  pull_request:
    paths:
      - "cmd/main.go"
      - "cmd/cmd/**"
      - "build/packer/linux/*"
      - "build/packer/linux/**/*"
      - "build/packer/windows/*"
      - "build/packer/windows/**/*"
      - "pkg/build/**"
      - "pkg/deploy/**"
      - "pkg/oci/**"
      - "pkg/provision/**"
      - "scripts/linux/*"
      - "scripts/linux/**/*"
      - "scripts/macos/create-win11-autounattend-iso.sh"
      - "scripts/macos/playwright_win11_iso.py"
      - "scripts/macos/requirements.txt"
      - "scripts/macos/download-arm64-uefi.sh"
      - "scripts/macos/download-utm-guest-tools.sh"
      - "scripts/macos/download-virtio-win-iso.sh"
      - ".github/workflows/test-build-linux.yml"
      - ".github/actions/download-build-cache/**"
      - ".github/actions/hetzner-github-runner/**"
      - ".github/actions/upload-build-cache/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  OCI_UBUNTU_IMAGE: ghcr.io/${{ github.repository_owner }}/ubuntu-24

jobs:
  test-cold-cache-dependency-bootstrap:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu
    name: cold-cache dependency bootstrap
    runs-on: ubuntu-24.04
    env:
      DEV_ALCHEMY_APP_DATA_DIR: ${{ github.workspace }}/.dev-alchemy
      DEV_ALCHEMY_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/cache
      DEV_ALCHEMY_VAGRANT_DIR: ${{ github.workspace }}/.dev-alchemy/.vagrant
      DEV_ALCHEMY_PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Clear managed cache and Playwright bootstrap state
        run: |
          rm -rf "${DEV_ALCHEMY_APP_DATA_DIR}" "${PLAYWRIGHT_BROWSERS_PATH}" "${HOME}/.cache/ms-playwright" scripts/macos/.venv

      - name: Install dependencies linux
        run: |
          go run cmd/main.go install

      - name: Run cold-cache dependency bootstrap tests
        shell: bash
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: |
          go test -timeout 45m -v ./pkg/build -run '^(TestGetWindows11DownloadAmd64|TestGetWindows11DownloadArm64|TestResolveDebianPackageURL|TestResolveAndDownloadQemuEfiAarch64)$'

  determine-runner-mode:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu
    runs-on: ubuntu-latest
    outputs:
      use-hetzner: ${{ steps.mode.outputs.use-hetzner }}
    steps:
      - name: Select runner mode
        id: mode
        env:
          GH_RUNNER_ADMIN_TOKEN: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          if [[ -n "${HCLOUD_TOKEN}" && -n "${GH_RUNNER_ADMIN_TOKEN}" ]]; then
            echo "use-hetzner=true" >> "${GITHUB_OUTPUT}"
          else
            echo "use-hetzner=false" >> "${GITHUB_OUTPUT}"
            echo "Hetzner runner secrets are unavailable; falling back to GitHub-hosted Linux runners." >> "${GITHUB_STEP_SUMMARY}"
          fi

  test-packer-build-hosted:
    needs: [determine-runner-mode]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu) && needs.determine-runner-mode.outputs.use-hetzner != 'true'
    name: build ${{ matrix.go_test_name }} runner_os ${{ matrix.runs_on }}
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      id-token: write
    env:
      DEV_ALCHEMY_APP_DATA_DIR: ${{ github.workspace }}/.dev-alchemy
      DEV_ALCHEMY_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/cache
      DEV_ALCHEMY_VAGRANT_DIR: ${{ github.workspace }}/.dev-alchemy/.vagrant
      DEV_ALCHEMY_PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm_os: ubuntu
            ubuntu_type: server
            arch: amd64
            go_test_name: TestBuildQemuUbuntuServerAmd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuAmd64OnLinux
            runs_on: ubuntu-24.04
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-amd64.iso"}]
          - vm_os: ubuntu
            ubuntu_type: desktop
            arch: amd64
            go_test_name: TestBuildQemuUbuntuDesktopAmd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuDesktopAmd64OnLinux
            runs_on: ubuntu-24.04
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-amd64.iso"}]
          - vm_os: windows11
            ubuntu_type: ""
            arch: amd64
            go_test_name: TestBuildQemuWindows11Amd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuWindows11Amd64OnLinux
            runs_on: ubuntu-24.04
            packer_start_only: "true"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/windows11/iso/win11_25h2_english_amd64.iso","container":"build-cache"},
               {"local-path":"./.dev-alchemy/cache/utm/utm-guest-tools-latest.iso"},
               {"local-path":"./.dev-alchemy/cache/windows/virtio-win.iso"}]
          - vm_os: ubuntu
            ubuntu_type: server
            arch: arm64
            go_test_name: TestBuildQemuUbuntuServerArm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuArm64OnLinux
            runs_on: ubuntu-24.04-arm
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-arm64.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]
          - vm_os: ubuntu
            ubuntu_type: desktop
            arch: arm64
            go_test_name: TestBuildQemuUbuntuDesktopArm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuDesktopArm64OnLinux
            runs_on: ubuntu-24.04-arm
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-arm64.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]
          - vm_os: windows11
            ubuntu_type: ""
            arch: arm64
            go_test_name: TestBuildQemuWindows11Arm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuWindows11Arm64OnLinux
            runs_on: ubuntu-24.04-arm
            packer_start_only: "true"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/windows11/iso/win11_25h2_english_arm64.iso","container":"build-cache"},
               {"local-path":"./.dev-alchemy/cache/utm/utm-guest-tools-latest.iso"},
               {"local-path":"./.dev-alchemy/cache/windows/virtio-win.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download build cache files
        uses: ./.github/actions/download-build-cache
        with:
          storage-backend: ftp
          files: ${{ matrix.cache_files }}
          ftp-server: ${{ vars.BUILD_CACHE_FTP_SERVER }}
          ftp-port: ${{ vars.BUILD_CACHE_FTP_PORT }}
          ftp-username: ${{ secrets.BUILD_CACHE_FTP_USERNAME }}
          ftp-password: ${{ secrets.BUILD_CACHE_FTP_PASSWORD }}
          ftp-base-dir: /private
          local-cache-dir: ""

      - name: Install dependencies linux
        run: |
          go run cmd/main.go install

      - name: Run dependency reconciliation smoke test TEST_NAME=${{ matrix.dependency_test_name }}
        id: dependency_reconciliation
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: |
          go test -timeout 45m -v ./pkg/build -run "^${{ matrix.dependency_test_name }}$"

      - name: Run build for arch=${{ matrix.arch }} TEST_NAME=${{ matrix.go_test_name }} on runner OS=${{ matrix.runs_on }}
        id: packer_build
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          DEV_ALCHEMY_PACKER_START_ONLY: ${{ matrix.packer_start_only }}
          DEV_ALCHEMY_PACKER_START_TIMEOUT: ${{ matrix.packer_start_timeout }}
          PACKER_LOG: 1
          PACKER_LOG_PATH: ${{ github.workspace }}/artifact/${{ matrix.go_test_name }}.packer.log
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifact
          go mod vendor
          make test-build-specific TEST_NAME=${{ matrix.go_test_name }}

      - name: Upload Ubuntu OCI build artifact
        if: steps.packer_build.outcome == 'success' && matrix.vm_os == 'ubuntu' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-oci-${{ matrix.ubuntu_type }}-${{ matrix.arch }}
          path: .dev-alchemy/cache/ubuntu/qemu-ubuntu-${{ matrix.ubuntu_type }}-packer-${{ matrix.arch }}.qcow2
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Move .vnc.mp4 files to artifact directory
        if: always()
        run: |
          mkdir -p artifact
          if [ -d ./.dev-alchemy/cache ]; then
            find ./.dev-alchemy/cache -name '*.vnc.mp4' -exec cp {} artifact/ \;
          fi

      - name: Upload packer log artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-log-${{ matrix.go_test_name }}
          path: artifact/${{ matrix.go_test_name }}.packer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload packer-qemu-${{ matrix.go_test_name }}.vnc.mp4 artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-qemu-${{ matrix.go_test_name }}.vnc.mp4
          path: artifact/*.vnc.mp4
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload build cache files
        uses: ./.github/actions/upload-build-cache
        with:
          storage-backend: ftp
          files: ${{ matrix.cache_files }}
          ftp-server: ${{ vars.BUILD_CACHE_FTP_SERVER }}
          ftp-port: ${{ vars.BUILD_CACHE_FTP_PORT }}
          ftp-username: ${{ secrets.BUILD_CACHE_FTP_USERNAME }}
          ftp-password: ${{ secrets.BUILD_CACHE_FTP_PASSWORD }}
          ftp-base-dir: /private
          local-cache-dir: ""

      - name: Fail if dependency reconciliation or build failed
        if: always() && (steps.dependency_reconciliation.outcome == 'failure' || steps.packer_build.outcome == 'failure')
        run: |
          echo "Dependency reconciliation and/or build smoke test failed. Failing workflow."
          exit 1

  provision-hetzner-linux-amd64-runner:
    needs: [determine-runner-mode]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu) && needs.determine-runner-mode.outputs.use-hetzner == 'true'
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.provision.outputs.label }}
      server-id: ${{ steps.provision.outputs.server_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Provision amd64 Hetzner runner
        id: provision
        uses: ./.github/actions/hetzner-github-runner
        with:
          mode: create
          github-token: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}
          name: gh-linux-amd64-${{ github.run_id }}-${{ github.run_attempt }}
          image: ${{ inputs.hetzner_image || 'ubuntu-24.04' }}
          location: ${{ inputs.hetzner_location || 'nbg1' }}
          runner-version: ${{ inputs.hetzner_runner_version || 'latest' }}
          server-type: ${{ inputs.hetzner_amd64_server_type || 'cpx31' }}

  provision-hetzner-linux-arm64-runner:
    needs: [determine-runner-mode]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu) && needs.determine-runner-mode.outputs.use-hetzner == 'true'
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.provision.outputs.label }}
      server-id: ${{ steps.provision.outputs.server_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Provision arm64 Hetzner runner
        id: provision
        uses: ./.github/actions/hetzner-github-runner
        with:
          mode: create
          github-token: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}
          name: gh-linux-arm64-${{ github.run_id }}-${{ github.run_attempt }}
          image: ${{ inputs.hetzner_image || 'ubuntu-24.04' }}
          location: ${{ inputs.hetzner_location || 'nbg1' }}
          runner-version: ${{ inputs.hetzner_runner_version || 'latest' }}
          server-type: ${{ inputs.hetzner_arm64_server_type || 'cax21' }}

  test-packer-build-hetzner-amd64:
    needs: [determine-runner-mode, provision-hetzner-linux-amd64-runner]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu) && needs.determine-runner-mode.outputs.use-hetzner == 'true'
    name: build ${{ matrix.go_test_name }} on Hetzner
    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ needs.provision-hetzner-linux-amd64-runner.outputs.runner-label }}
    permissions:
      contents: read
      id-token: write
    env:
      DEV_ALCHEMY_APP_DATA_DIR: ${{ github.workspace }}/.dev-alchemy
      DEV_ALCHEMY_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/cache
      DEV_ALCHEMY_VAGRANT_DIR: ${{ github.workspace }}/.dev-alchemy/.vagrant
      DEV_ALCHEMY_PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm_os: ubuntu
            ubuntu_type: server
            arch: amd64
            go_test_name: TestBuildQemuUbuntuServerAmd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuAmd64OnLinux
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-amd64.iso"}]
          - vm_os: ubuntu
            ubuntu_type: desktop
            arch: amd64
            go_test_name: TestBuildQemuUbuntuDesktopAmd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuDesktopAmd64OnLinux
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-amd64.iso"}]
          - vm_os: windows11
            ubuntu_type: ""
            arch: amd64
            go_test_name: TestBuildQemuWindows11Amd64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuWindows11Amd64OnLinux
            packer_start_only: "true"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/windows11/iso/win11_25h2_english_amd64.iso","container":"build-cache"},
               {"local-path":"./.dev-alchemy/cache/utm/utm-guest-tools-latest.iso"},
               {"local-path":"./.dev-alchemy/cache/windows/virtio-win.iso"}]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download build cache files
        uses: ./.github/actions/download-build-cache
        with:
          storage-backend: ftp
          files: ${{ matrix.cache_files }}
          ftp-server: ${{ vars.BUILD_CACHE_FTP_SERVER }}
          ftp-port: ${{ vars.BUILD_CACHE_FTP_PORT }}
          ftp-username: ${{ secrets.BUILD_CACHE_FTP_USERNAME }}
          ftp-password: ${{ secrets.BUILD_CACHE_FTP_PASSWORD }}
          ftp-base-dir: /private
          local-cache-dir: ""

      - name: Install dependencies linux
        run: |
          go run cmd/main.go install

      - name: Run dependency reconciliation smoke test TEST_NAME=${{ matrix.dependency_test_name }}
        id: dependency_reconciliation
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: |
          go test -timeout 45m -v ./pkg/build -run "^${{ matrix.dependency_test_name }}$"

      - name: Run build for arch=${{ matrix.arch }} TEST_NAME=${{ matrix.go_test_name }} on Hetzner
        id: packer_build
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          DEV_ALCHEMY_PACKER_START_ONLY: ${{ matrix.packer_start_only }}
          DEV_ALCHEMY_PACKER_START_TIMEOUT: ${{ matrix.packer_start_timeout }}
          PACKER_LOG: 1
          PACKER_LOG_PATH: ${{ github.workspace }}/artifact/${{ matrix.go_test_name }}.packer.log
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifact
          go mod vendor
          make test-build-specific TEST_NAME=${{ matrix.go_test_name }}

      - name: Upload Ubuntu OCI build artifact
        if: steps.packer_build.outcome == 'success' && matrix.vm_os == 'ubuntu' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-oci-${{ matrix.ubuntu_type }}-${{ matrix.arch }}
          path: .dev-alchemy/cache/ubuntu/qemu-ubuntu-${{ matrix.ubuntu_type }}-packer-${{ matrix.arch }}.qcow2
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Move .vnc.mp4 files to artifact directory
        if: always()
        run: |
          mkdir -p artifact
          if [ -d ./.dev-alchemy/cache ]; then
            find ./.dev-alchemy/cache -name '*.vnc.mp4' -exec cp {} artifact/ \;
          fi

      - name: Upload packer log artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-log-${{ matrix.go_test_name }}
          path: artifact/${{ matrix.go_test_name }}.packer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload packer-qemu-${{ matrix.go_test_name }}.vnc.mp4 artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-qemu-${{ matrix.go_test_name }}.vnc.mp4
          path: artifact/*.vnc.mp4
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload build cache files
        uses: ./.github/actions/upload-build-cache
        with:
          storage-backend: ftp
          files: ${{ matrix.cache_files }}
          ftp-server: ${{ vars.BUILD_CACHE_FTP_SERVER }}
          ftp-port: ${{ vars.BUILD_CACHE_FTP_PORT }}
          ftp-username: ${{ secrets.BUILD_CACHE_FTP_USERNAME }}
          ftp-password: ${{ secrets.BUILD_CACHE_FTP_PASSWORD }}
          ftp-base-dir: /private
          local-cache-dir: ""

      - name: Fail if dependency reconciliation or build failed
        if: always() && (steps.dependency_reconciliation.outcome == 'failure' || steps.packer_build.outcome == 'failure')
        run: |
          echo "Dependency reconciliation and/or build smoke test failed. Failing workflow."
          exit 1

  test-packer-build-hetzner-arm64:
    needs: [determine-runner-mode, provision-hetzner-linux-arm64-runner]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu) && needs.determine-runner-mode.outputs.use-hetzner == 'true'
    name: build ${{ matrix.go_test_name }} on Hetzner
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - ${{ needs.provision-hetzner-linux-arm64-runner.outputs.runner-label }}
    permissions:
      contents: read
      id-token: write
    env:
      DEV_ALCHEMY_APP_DATA_DIR: ${{ github.workspace }}/.dev-alchemy
      DEV_ALCHEMY_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/cache
      DEV_ALCHEMY_VAGRANT_DIR: ${{ github.workspace }}/.dev-alchemy/.vagrant
      DEV_ALCHEMY_PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm_os: ubuntu
            ubuntu_type: server
            arch: arm64
            go_test_name: TestBuildQemuUbuntuServerArm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuArm64OnLinux
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-arm64.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]
          - vm_os: ubuntu
            ubuntu_type: desktop
            arch: arm64
            go_test_name: TestBuildQemuUbuntuDesktopArm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuUbuntuDesktopArm64OnLinux
            packer_start_only: "false"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/linux/ubuntu-24.04.4-live-server-arm64.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]
          - vm_os: windows11
            ubuntu_type: ""
            arch: arm64
            go_test_name: TestBuildQemuWindows11Arm64OnLinux
            dependency_test_name: TestIntegrationDependencyReconciliationQemuWindows11Arm64OnLinux
            packer_start_only: "true"
            packer_start_timeout: "180"
            cache_files: >-
              [{"local-path":"./.dev-alchemy/cache/windows11/iso/win11_25h2_english_arm64.iso","container":"build-cache"},
               {"local-path":"./.dev-alchemy/cache/utm/utm-guest-tools-latest.iso"},
               {"local-path":"./.dev-alchemy/cache/windows/virtio-win.iso"},
               {"local-path":"./.dev-alchemy/cache/qemu-efi-aarch64_all.deb"}]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download build cache files
        uses: ./.github/actions/download-build-cache
        with:
          storage-backend: ftp
          files: ${{ matrix.cache_files }}
          ftp-server: ${{ vars.BUILD_CACHE_FTP_SERVER }}
          ftp-port: ${{ vars.BUILD_CACHE_FTP_PORT }}
          ftp-username: ${{ secrets.BUILD_CACHE_FTP_USERNAME }}
          ftp-password: ${{ secrets.BUILD_CACHE_FTP_PASSWORD }}
          ftp-base-dir: /private
          local-cache-dir: ""

      - name: Install dependencies linux
        run: |
          go run cmd/main.go install

      - name: Run dependency reconciliation smoke test TEST_NAME=${{ matrix.dependency_test_name }}
        id: dependency_reconciliation
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: |
          go test -timeout 45m -v ./pkg/build -run "^${{ matrix.dependency_test_name }}$"

      - name: Run build for arch=${{ matrix.arch }} TEST_NAME=${{ matrix.go_test_name }} on Hetzner
        id: packer_build
        shell: bash
        continue-on-error: true
        env:
          RUN_INTEGRATION_TESTS: "1"
          DEV_ALCHEMY_PACKER_START_ONLY: ${{ matrix.packer_start_only }}
          DEV_ALCHEMY_PACKER_START_TIMEOUT: ${{ matrix.packer_start_timeout }}
          PACKER_LOG: 1
          PACKER_LOG_PATH: ${{ github.workspace }}/artifact/${{ matrix.go_test_name }}.packer.log
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifact
          go mod vendor
          make test-build-specific TEST_NAME=${{ matrix.go_test_name }}

      - name: Upload Ubuntu OCI build artifact
        if: steps.packer_build.outcome == 'success' && matrix.vm_os == 'ubuntu' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-oci-${{ matrix.ubuntu_type }}-${{ matrix.arch }}
          path: .dev-alchemy/cache/ubuntu/qemu-ubuntu-${{ matrix.ubuntu_type }}-packer-${{ matrix.arch }}.qcow2
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Move .vnc.mp4 files to artifact directory
        if: always()
        run: |
          mkdir -p artifact
          if [ -d ./.dev-alchemy/cache ]; then
            find ./.dev-alchemy/cache -name '*.vnc.mp4' -exec cp {} artifact/ \;
          fi

      - name: Upload packer log artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-log-${{ matrix.go_test_name }}
          path: artifact/${{ matrix.go_test_name }}.packer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload packer-qemu-${{ matrix.go_test_name }}.vnc.mp4 artifact (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: packer-qemu-${{ matrix.go_test_name }}.vnc.mp4
          path: artifact/*.vnc.mp4
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload build cache files
        uses: ./.github/actions/upload-build-cache
        with:
          storage-backend: ftp
          files: ${{ matrix.cache_files }}
          ftp-server: ${{ vars.BUILD_CACHE_FTP_SERVER }}
          ftp-port: ${{ vars.BUILD_CACHE_FTP_PORT }}
          ftp-username: ${{ secrets.BUILD_CACHE_FTP_USERNAME }}
          ftp-password: ${{ secrets.BUILD_CACHE_FTP_PASSWORD }}
          ftp-base-dir: /private
          local-cache-dir: ""

      - name: Fail if dependency reconciliation or build failed
        if: always() && (steps.dependency_reconciliation.outcome == 'failure' || steps.packer_build.outcome == 'failure')
        run: |
          echo "Dependency reconciliation and/or build smoke test failed. Failing workflow."
          exit 1

  publish-ubuntu-oci-artifacts:
    needs:
      - determine-runner-mode
      - test-packer-build-hosted
      - test-packer-build-hetzner-amd64
      - test-packer-build-hetzner-arm64
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.test-packer-build-hosted.result == 'success' ||
        (
          needs.test-packer-build-hetzner-amd64.result == 'success' &&
          needs.test-packer-build-hetzner-arm64.result == 'success'
        )
      )
    name: publish ubuntu ${{ matrix.ubuntu_type }} ${{ matrix.arch }} OCI artifact
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      DEV_ALCHEMY_APP_DATA_DIR: ${{ github.workspace }}/.dev-alchemy
      DEV_ALCHEMY_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/cache
      DEV_ALCHEMY_VAGRANT_DIR: ${{ github.workspace }}/.dev-alchemy/.vagrant
      DEV_ALCHEMY_PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
      PACKER_CACHE_DIR: ${{ github.workspace }}/.dev-alchemy/packer_cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu_type: server
            arch: amd64
          - ubuntu_type: desktop
            arch: amd64
          - ubuntu_type: server
            arch: arm64
          - ubuntu_type: desktop
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Ubuntu OCI build artifact
        uses: actions/download-artifact@v8
        with:
          name: ubuntu-oci-${{ matrix.ubuntu_type }}-${{ matrix.arch }}
          path: .dev-alchemy/cache/ubuntu

      - name: Push Ubuntu OCI artifact to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reference="${OCI_UBUNTU_IMAGE}:${{ matrix.ubuntu_type }}-${{ matrix.arch }}-linux-build"
          echo "Pushing ${reference}"
          printf '%s' "${GHCR_TOKEN}" | go run cmd/main.go push "${reference}" \
            --os ubuntu \
            --type "${{ matrix.ubuntu_type }}" \
            --arch "${{ matrix.arch }}" \
            --host-os linux \
            --engine qemu \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

  watch-hetzner-linux-amd64-runner-queue:
    needs: [determine-runner-mode, provision-hetzner-linux-amd64-runner]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.enable_linux_qemu) && needs.determine-runner-mode.outputs.use-hetzner == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for amd64 Hetzner build to leave queue
        id: watch_queue
        env:
          GH_TOKEN: ${{ github.token }}
          POLL_INTERVAL_SECONDS: "30"
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TARGET_JOB_PATTERN: "^build TestBuildQemu(Ubuntu|Windows11).*Amd64OnLinux on Hetzner$"
          WAIT_TIMEOUT_SECONDS: "900"
        run: |
          deadline=$(( $(date +%s) + WAIT_TIMEOUT_SECONDS ))
          github_api_version="2022-11-28"
          cleanup_required=false

          while true; do
            now=$(date +%s)
            jobs_json="$(
              curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: ${github_api_version}" \
                "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100"
            )"
            job_state="$(
              TARGET_JOB_PATTERN="${TARGET_JOB_PATTERN}" python3 -c 'import json, os, re, sys; pattern = re.compile(os.environ["TARGET_JOB_PATTERN"]); jobs = json.load(sys.stdin).get("jobs", []); matches = [job for job in jobs if pattern.match(job.get("name", ""))]; active = next((job for job in matches if job.get("status") in ("in_progress", "completed")), None); selected = active or (matches[0] if matches else None); print((selected.get("name", "") if selected else "") + "\t" + (selected.get("status", "") if selected else "") + "\t" + ((selected.get("conclusion") or "") if selected else ""))' <<< "${jobs_json}"
            )"
            IFS=$'\t' read -r matched_job_name job_status job_conclusion <<< "${job_state}"

            if [[ -n "${job_status}" ]]; then
              echo "Observed ${matched_job_name}: status=${job_status} conclusion=${job_conclusion:-none}"
            else
              echo "Waiting for a matching amd64 Hetzner build job to appear in workflow jobs list"
            fi

            if [[ "${job_status}" == "in_progress" || "${job_status}" == "completed" ]]; then
              echo "${matched_job_name} has left the queue"
              exit 0
            fi

            if (( now >= deadline )); then
              cleanup_required=true
              break
            fi

            sleep "${POLL_INTERVAL_SECONDS}"
          done

          echo "cleanup_required=${cleanup_required}" >> "${GITHUB_OUTPUT}"

      - name: Delete timed out amd64 Hetzner runner
        if: steps.watch_queue.outputs.cleanup_required == 'true'
        uses: ./.github/actions/hetzner-github-runner
        with:
          mode: delete
          github-token: ${{ secrets.GH_RUNNER_ADMIN_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.provision-hetzner-linux-amd64-runner.outputs.runner-label }}
          server-id: ${{ needs.provision-hetzner-linux-amd64-runner.outputs.server-id }}

      - name: Cancel workflow after amd64 queue timeout
        if: steps.watch_queue.outputs.cleanup_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/force-cancel" >/dev/null || \
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/cancel" >/dev/null || true
          exit 1

