# GitHub Actions workflow to test all Ansible roles on Windows, macOS, and Ubuntu
name: Test Ansible Roles

on:
  push:
    branches: [main, feat*]
    paths:
      - "roles/**"
      - "playbooks/**"
      - "inventory/**"
      - ".github/workflows/test-ansible-roles.yml"
  pull_request:
    branches: [main, feat*]
    paths:
      - "roles/**"
      - "playbooks/**"
      - "inventory/**"
      - ".github/workflows/test-ansible-roles.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-ansible-roles:
    name: Ansible on ${{ matrix.os }} with protocol ${{ matrix.ansible_protocol }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15, ubuntu-24.04, windows-2025]
        ansible_protocol: [ssh]
        include:
          - os: windows-2025
            ansible_protocol: winrm
    steps:
      - uses: fkirc/skip-duplicate-actions@v5
        with:
          cancel_others: true

      - name: Convert line endings to LF
        if: runner.os == 'Windows'
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
        if: runner.os != 'Windows'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
        if: runner.os == 'Windows'

      - name: Windows install cygwin
        uses: cygwin/cygwin-install-action@v6
        if: runner.os == 'Windows'
        with:
          packages: python39,python39-pip,python39-cryptography,openssh,git,make,gcc-core,gcc-g++,libffi-devel,sshpass

      - name: Windows detect cygwin bash
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $candidates = @(
            'C:\tools\cygwin\bin\bash.exe',
            'C:\cygwin64\bin\bash.exe',
            'C:\cygwin\bin\bash.exe',
            'D:\cygwin\bin\bash.exe'
          )
          $cygwinBashPath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $cygwinBashPath) {
            throw "Unable to find cygwin bash.exe. Checked: $($candidates -join ', ')"
          }
          "CYGWIN_BASH_PATH=$cygwinBashPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Windows install Ansible
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          & $env:CYGWIN_BASH_PATH -l -c "python -m pip install ansible pywinrm"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
        if: runner.os != 'Windows'

      - name: Display Ansible version
        run: ansible --version
        if: runner.os != 'Windows'

      - name: Windows enable winrm
        if: runner.os == 'Windows' && matrix.ansible_protocol == 'winrm'
        shell: powershell
        run: |
          Set-Item -Path WSMan:\localhost\Service\AllowUnencrypted -Value $true;
          Set-Item -Path WSMan:\localhost\Service\Auth\Basic -Value $true;
          Enable-PSRemoting -Force;

      - name: Windows enable ssh
        if: runner.os == 'Windows' && matrix.ansible_protocol == 'ssh'
        shell: powershell
        run: |
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0;
          Start-Service sshd; Set-Service -Name sshd -StartupType 'Automatic';

      # hardcoded passwords are bad, but this is just for testing
      - name: Windows create local ansible user
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          net user ansible 'Secret123!@#' /add;
          net localgroup Administrators ansible /add;

      - name: Check if ssh user on windows can connect
        if: runner.os == 'Windows' && matrix.ansible_protocol == 'ssh'
        shell: powershell
        run: |
          sshpass -p 'Secret123!@#' ssh -o StrictHostKeyChecking=no ansible@localhost -p 22 "whoami"

      # Set default shell for OpenSSH to PowerShell, otherwise Ansible will fail with the default cmd.exe
      - name: Set default shell for OpenSSH on Windows to PowerShell
        if: runner.os == 'Windows' && matrix.ansible_protocol == 'ssh'
        shell: powershell
        run: |
          New-ItemProperty -Path 'HKLM:\SOFTWARE\OpenSSH' -Name 'DefaultShell' -Value 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe' -PropertyType String -Force

      - name: Run all Ansible roles
        shell: bash
        run: |
          ansible-playbook -i inventory/localhost.yaml playbooks/setup.yml
        env:
          ANSIBLE_FORCE_COLOR: "true"
        if: runner.os != 'Windows'

      - name: Run all Ansible roles on Windows over SSH (with retries)
        if: runner.os == 'Windows' && matrix.ansible_protocol == 'ssh'
        shell: powershell
        env:
          ANSIBLE_FORCE_COLOR: "true"
        run: |
          $maxRetries = 6
          $success = $false
          $workspace = $env:GITHUB_WORKSPACE
          $drive = $workspace.Substring(0, 1).ToLowerInvariant()
          $rest = $workspace.Substring(2).Replace('\', '/')
          $cygwinWorkspace = "/cygdrive/$drive$rest"

          for ($count = 1; $count -le $maxRetries -and -not $success; $count++) {
            & $env:CYGWIN_BASH_PATH -l -c "cd '$cygwinWorkspace' && ansible-playbook -i inventory/localhost_windows_ssh.yml -l windows_host playbooks/setup.yml"
            if ($LASTEXITCODE -eq 0) {
              $success = $true
            } else {
              Write-Host "Attempt $count failed with exit code $LASTEXITCODE."
              if ($count -lt $maxRetries) { Start-Sleep -Seconds 10 }
            }
          }
          if (-not $success) { throw "All $maxRetries attempts failed." }

      - name: Run all Ansible roles on Windows via local provision wrapper (with retries)
        if: runner.os == 'Windows' && matrix.ansible_protocol == 'winrm'
        shell: powershell
        env:
          ANSIBLE_FORCE_COLOR: "true"
        run: |
          $maxRetries = 6
          $success = $false

          for ($count = 1; $count -le $maxRetries -and -not $success; $count++) {
            go run cmd/main.go provision local --yes
            if ($LASTEXITCODE -eq 0) {
              $success = $true
            } else {
              Write-Host "Attempt $count failed with exit code $LASTEXITCODE."
              if ($count -lt $maxRetries) { Start-Sleep -Seconds 10 }
            }
          }
          if (-not $success) { throw "All $maxRetries attempts failed." }
