name: 'Upload Windows ISO to Azure Blob Storage'
description: 'Creates Azure Blob Storage and uploads Windows ISO if it exists'

inputs:
  iso-path:
    description: 'Path to the Windows ISO file'
    required: true
  subscription-id:
    description: 'Azure subscription ID'
    required: true

runs:
  using: "composite"
  steps:
    - name: Create storage account and upload Windows ISO
      shell: powershell
      run: |
        $isoPath = "${{ inputs.iso-path }}"
        
        if (Test-Path $isoPath) {
          Write-Host "Windows ISO found at $isoPath"
          
          $storageAccountName = "ghrunner${{ inputs.subscription-id }}".Substring(0, 24) -replace '[^a-z0-9]', ''
          $resourceGroup = "gh-runner-storage-rg"
          $location = "eastus2"
          $containerName = "windows-isos"
          
          # Upload ISO to blob storage
          Write-Host "Uploading Windows ISO to blob storage..."
          az storage blob upload `
            --account-name $storageAccountName `
            --container-name $containerName `
            --name "win11_25h2_english_amd64.iso" `
            --file $isoPath `
            --auth-mode login `
            --overwrite true
          
          Write-Host "Successfully uploaded Windows ISO to Azure Blob Storage"
        } else {
          Write-Host "Windows ISO not found at $isoPath, skipping upload"
        }
