name: "Hetzner GitHub Runner"
description: "Create or delete an ephemeral self-hosted GitHub Actions runner on Hetzner Cloud"

inputs:
  mode:
    description: "Runner lifecycle action: create or delete"
    required: true
  github-token:
    description: "GitHub token with repository Administration permission; optional in delete mode for runner deregistration and optional in create mode"
    required: false
  runner-registration-token:
    description: "Short-lived GitHub runner registration token used in create mode"
    required: false
  function-app-name:
    description: "Azure Function App name used to mint a runner registration token on demand in create mode"
    required: false
    default: ""
  azure-client-id:
    description: "Azure application client ID used as the function app API audience in create mode"
    required: false
    default: ""
  hcloud-token:
    description: "Hetzner Cloud API token"
    required: true
  name:
    description: "Unique runner/server name"
    required: false
  image:
    description: "Hetzner image name or ID"
    required: false
    default: "ubuntu-24.04"
  location:
    description: "Hetzner location name"
    required: false
    default: "nbg1"
  server-type:
    description: "Hetzner server type"
    required: false
    default: "cpx32"
  runner-version:
    description: "GitHub Actions runner version, or latest"
    required: false
    default: "latest"
  runner-dir:
    description: "Runner installation directory"
    required: false
    default: "/actions-runner"
  pre-runner-script:
    description: "Shell commands to run on the server before the runner starts"
    required: false
    default: ""
  create-wait:
    description: "Create retries at 10 seconds each"
    required: false
    default: "36"
  delete-wait:
    description: "Delete retries at 10 seconds each"
    required: false
    default: "18"
  runner-wait:
    description: "Runner registration retries at 10 seconds each"
    required: false
    default: "36"
  server-wait:
    description: "Server boot retries at 10 seconds each"
    required: false
    default: "30"
  enable-ipv4:
    description: "Attach a public IPv4 address"
    required: false
    default: "true"
  enable-ipv6:
    description: "Attach a public IPv6 address"
    required: false
    default: "true"
  server-id:
    description: "Hetzner server ID used in delete mode"
    required: false
    default: ""

outputs:
  label:
    description: "Unique runner label"
    value: ${{ steps.runner.outputs.label }}
  server_id:
    description: "Hetzner server ID"
    value: ${{ steps.runner.outputs.server_id }}

runs:
  using: "composite"
  steps:
    - name: Manage Hetzner runner
      id: runner
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_CREATE_WAIT: ${{ inputs.create-wait }}
        INPUT_DELETE_WAIT: ${{ inputs.delete-wait }}
        INPUT_ENABLE_IPV4: ${{ inputs.enable-ipv4 }}
        INPUT_ENABLE_IPV6: ${{ inputs.enable-ipv6 }}
        INPUT_FUNCTION_APP_NAME: ${{ inputs.function-app-name }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_RUNNER_REGISTRATION_TOKEN: ${{ inputs.runner-registration-token }}
        INPUT_HCLOUD_TOKEN: ${{ inputs.hcloud-token }}
        INPUT_AZURE_CLIENT_ID: ${{ inputs.azure-client-id }}
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_LOCATION: ${{ inputs.location }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_PRE_RUNNER_SCRIPT: ${{ inputs.pre-runner-script }}
        INPUT_RUNNER_DIR: ${{ inputs.runner-dir }}
        INPUT_RUNNER_VERSION: ${{ inputs.runner-version }}
        INPUT_RUNNER_WAIT: ${{ inputs.runner-wait }}
        INPUT_SERVER_ID: ${{ inputs.server-id }}
        INPUT_SERVER_TYPE: ${{ inputs.server-type }}
        INPUT_SERVER_WAIT: ${{ inputs.server-wait }}
      run: bash action.sh
