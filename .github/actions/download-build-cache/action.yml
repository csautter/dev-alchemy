name: 'Download Build Cache Files'
description: >
  For each file in the supplied list, checks the local workspace first, then the
  local runner shared-volume cache (macOS Tart VirtioFS), and finally the
  selected remote cache backend. Works on Windows, macOS, and Linux.

inputs:
  storage-backend:
    description: >
      Remote cache backend. Use "ftp" for explicit FTPS, "hetzner-s3" for
      Hetzner Object Storage, or "azure" for the legacy Azure Blob Storage backend.
    required: false
    default: 'ftp'
  files:
    description: |
      JSON array of cache file descriptors. Each object may contain:
        - local-path  (required) path where the file should live in the workspace
        - blob-name   (optional) object key; defaults to basename of local-path
        - container   (optional) legacy Azure container name, or S3 bucket fallback; ignored by FTP; defaults to "build-cache"
      Example:
        '[{"local-path":"./cache/windows11/iso/win11.iso","container":"build-cache"}]'
      Pass '[]' to skip all cache operations (e.g. for builds with no cached files).
    required: true
  subscription-id:
    description: 'Azure subscription ID used to derive the storage account name when storage-backend is "azure"'
    required: false
    default: ''
  s3-endpoint-url:
    description: 'Hetzner S3 endpoint URL, for example https://fsn1.your-objectstorage.com'
    required: false
    default: ''
  s3-bucket:
    description: 'Hetzner S3 bucket name. Defaults to each file descriptor container value when empty.'
    required: false
    default: ''
  s3-access-key-id:
    description: 'Hetzner S3 access key ID'
    required: false
    default: ''
  s3-secret-access-key:
    description: 'Hetzner S3 secret access key'
    required: false
    default: ''
  s3-prefix:
    description: 'Optional prefix prepended to all S3 object keys'
    required: false
    default: ''
  ftp-server:
    description: 'FTP server hostname. Explicit TLS is enforced by the scripts.'
    required: false
    default: ''
  ftp-port:
    description: 'FTP server port. Leave empty to use the default FTP port.'
    required: false
    default: ''
  ftp-username:
    description: 'FTP username'
    required: false
    default: ''
  ftp-password:
    description: 'FTP password'
    required: false
    default: ''
  ftp-base-dir:
    description: 'Base directory on the FTP server. Defaults to "/private".'
    required: false
    default: ''
  local-cache-dir:
    description: >
      Path to the local runner shared-volume cache directory.
      On macOS Tart runners this is the VirtioFS mount exposed by the host
      (e.g. /Volumes/My Shared Files/build-cache).
      Leave empty to disable local cache look-up.
    required: false
    default: '/Volumes/My Shared Files/build-cache'

runs:
  using: "composite"
  steps:
    - name: Download build cache files (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      continue-on-error: true
      env:
        CACHE_FILES: ${{ inputs.files }}
        CACHE_BACKEND: ${{ inputs.storage-backend }}
        SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
        HETZNER_S3_ENDPOINT_URL: ${{ inputs.s3-endpoint-url || env.HETZNER_S3_ENDPOINT_URL || env.S3_ENDPOINT_URL }}
        HETZNER_S3_BUCKET: ${{ inputs.s3-bucket || env.HETZNER_S3_BUCKET || env.S3_BUCKET }}
        HETZNER_S3_ACCESS_KEY_ID: ${{ inputs.s3-access-key-id || env.HETZNER_S3_ACCESS_KEY_ID || env.AWS_ACCESS_KEY_ID }}
        HETZNER_S3_SECRET_ACCESS_KEY: ${{ inputs.s3-secret-access-key || env.HETZNER_S3_SECRET_ACCESS_KEY || env.AWS_SECRET_ACCESS_KEY }}
        HETZNER_S3_PREFIX: ${{ inputs.s3-prefix || env.HETZNER_S3_PREFIX || env.S3_PREFIX }}
        FTP_SERVER: ${{ inputs.ftp-server || env.BUILD_CACHE_FTP_SERVER || env.FTP_SERVER }}
        FTP_PORT: ${{ inputs.ftp-port || env.BUILD_CACHE_FTP_PORT || env.FTP_PORT }}
        FTP_USERNAME: ${{ inputs.ftp-username || env.BUILD_CACHE_FTP_USERNAME || env.FTP_USERNAME }}
        FTP_PASSWORD: ${{ inputs.ftp-password || env.BUILD_CACHE_FTP_PASSWORD || env.FTP_PASSWORD }}
        FTP_BASE_DIR: ${{ inputs.ftp-base-dir || env.BUILD_CACHE_FTP_BASE_DIR || env.FTP_BASE_DIR || '/private' }}
        LOCAL_CACHE_DIR: ${{ inputs.local-cache-dir }}
      run: bash "${{ github.action_path }}/scripts/download-build-cache.sh"

    - name: Download build cache files (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      continue-on-error: true
      env:
        CACHE_FILES: ${{ inputs.files }}
        CACHE_BACKEND: ${{ inputs.storage-backend }}
        SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
        HETZNER_S3_ENDPOINT_URL: ${{ inputs.s3-endpoint-url || env.HETZNER_S3_ENDPOINT_URL || env.S3_ENDPOINT_URL }}
        HETZNER_S3_BUCKET: ${{ inputs.s3-bucket || env.HETZNER_S3_BUCKET || env.S3_BUCKET }}
        HETZNER_S3_ACCESS_KEY_ID: ${{ inputs.s3-access-key-id || env.HETZNER_S3_ACCESS_KEY_ID || env.AWS_ACCESS_KEY_ID }}
        HETZNER_S3_SECRET_ACCESS_KEY: ${{ inputs.s3-secret-access-key || env.HETZNER_S3_SECRET_ACCESS_KEY || env.AWS_SECRET_ACCESS_KEY }}
        HETZNER_S3_PREFIX: ${{ inputs.s3-prefix || env.HETZNER_S3_PREFIX || env.S3_PREFIX }}
        FTP_SERVER: ${{ inputs.ftp-server || env.BUILD_CACHE_FTP_SERVER || env.FTP_SERVER }}
        FTP_PORT: ${{ inputs.ftp-port || env.BUILD_CACHE_FTP_PORT || env.FTP_PORT }}
        FTP_USERNAME: ${{ inputs.ftp-username || env.BUILD_CACHE_FTP_USERNAME || env.FTP_USERNAME }}
        FTP_PASSWORD: ${{ inputs.ftp-password || env.BUILD_CACHE_FTP_PASSWORD || env.FTP_PASSWORD }}
        FTP_BASE_DIR: ${{ inputs.ftp-base-dir || env.BUILD_CACHE_FTP_BASE_DIR || env.FTP_BASE_DIR || '/private' }}
        LOCAL_CACHE_DIR: ${{ inputs.local-cache-dir }}
      run: |
        & "${{ github.action_path }}\scripts\download-build-cache.ps1"
