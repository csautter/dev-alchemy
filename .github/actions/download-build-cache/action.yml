name: 'Download Build Cache Files'
description: >
  For each file in the supplied list, checks the local workspace first, then the
  local runner shared-volume cache (macOS Tart VirtioFS), and finally Azure Blob
  Storage. Works on Windows, macOS, and Linux.

inputs:
  files:
    description: |
      JSON array of cache file descriptors. Each object may contain:
        - local-path  (required) path where the file should live in the workspace
        - blob-name   (optional) blob key in Azure Storage; defaults to basename of local-path
        - container   (optional) Azure Blob container name; defaults to "build-cache"
      Example:
        '[{"local-path":"./cache/windows11/iso/win11.iso","container":"windows-isos"}]'
      Pass '[]' to skip all cache operations (e.g. for builds with no cached files).
    required: true
  subscription-id:
    description: 'Azure subscription ID used to derive the storage account name'
    required: true
  local-cache-dir:
    description: >
      Path to the local runner shared-volume cache directory.
      On macOS Tart runners this is the VirtioFS mount exposed by the host
      (e.g. /Volumes/My Shared Files/build-cache).
      Leave empty to disable local cache look-up.
    required: false
    default: '/Volumes/My Shared Files/build-cache'

runs:
  using: "composite"
  steps:
    - name: Download build cache files (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      continue-on-error: true
      run: |
        FILES='${{ inputs.files }}'
        STORAGE_ACCOUNT=$(echo "ghrunner${{ inputs.subscription-id }}" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-24)
        RESOURCE_GROUP="gh-runner-storage-rg"
        LOCAL_CACHE_DIR="${{ inputs.local-cache-dir }}"

        # Iterate over each entry in the JSON array using Python (always available on runners)
        echo "$FILES" | python3 -c "import json,sys;data=json.load(sys.stdin);[print(f.get('local-path',''),f.get('blob-name',''),f.get('container','build-cache'),sep='\n') for f in data]" | while IFS= read -r local_path && IFS= read -r blob_name && IFS= read -r container; do
          [ -z "$local_path" ] && continue
          [ -z "$blob_name" ] && blob_name=$(basename "$local_path")

          echo "=== Build cache: $local_path [blob=$blob_name container=$container] ==="

          # 1. Already present in workspace → nothing to do
          if [ -f "$local_path" ]; then
            echo "  ✓ Already present at $local_path — skipping."
            continue
          fi

          # 2. Local runner shared-volume cache (macOS Tart VirtioFS) → symlink
          if [ -n "$LOCAL_CACHE_DIR" ] && [ -f "${LOCAL_CACHE_DIR}/${blob_name}" ]; then
            echo "  ✓ Found in local runner cache — creating symlink."
            mkdir -p "$(dirname "$local_path")"
            ln -sf "${LOCAL_CACHE_DIR}/${blob_name}" "$local_path"
            continue
          fi

          # 3. Azure Blob Storage → download
          echo "  ↓ Not in local cache. Attempting Azure Blob Storage download..."
          if az storage account show \
              --name "$STORAGE_ACCOUNT" \
              --resource-group "$RESOURCE_GROUP" &>/dev/null; then
            blob_exists=$(az storage blob exists \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name "$container" \
              --name "$blob_name" \
              --auth-mode login \
              --query "exists" \
              --output tsv)
            if [ "$blob_exists" = "true" ]; then
              mkdir -p "$(dirname "$local_path")"
              az storage blob download \
                --account-name "$STORAGE_ACCOUNT" \
                --container-name "$container" \
                --name "$blob_name" \
                --file "$local_path" \
                --auth-mode login
              echo "  ✓ Downloaded $blob_name → $local_path"
            else
              echo "  ✗ Blob $blob_name not found in container '$container'."
            fi
          else
            echo "  ✗ Storage account $STORAGE_ACCOUNT not found."
          fi
        done

    - name: Download build cache files (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      continue-on-error: true
      run: |
        $files         = '${{ inputs.files }}' | ConvertFrom-Json
        $storageAcct   = ("ghrunner${{ inputs.subscription-id }}" -replace '-', '').Substring(0, 24)
        $resourceGroup = "gh-runner-storage-rg"

        foreach ($f in $files) {
          $localPath = $f.'local-path'
          $blobName  = if ($f.'blob-name') { $f.'blob-name' } else { Split-Path -Leaf $localPath }
          $container = if ($f.'container') { $f.'container' } else { "build-cache" }

          Write-Host "=== Build cache: $localPath [blob=$blobName container=$container] ==="

          # 1. Already present in workspace → nothing to do
          if (Test-Path $localPath) {
            Write-Host "  ✓ Already present at $localPath — skipping."
            continue
          }

          # 2. Azure Blob Storage → download
          # (Windows Azure runners have no shared-volume cache)
          Write-Host "  ↓ Attempting Azure Blob Storage download..."
          $saArgs = @('storage', 'account', 'show', '--name', $storageAcct, '--resource-group', $resourceGroup)
          $sa = az @saArgs 2>$null | ConvertFrom-Json

          if ($sa) {
            $existsArgs = @('storage', 'blob', 'exists', '--account-name', $storageAcct, '--container-name', $container, '--name', $blobName, '--auth-mode', 'login')
            $blobExists = az @existsArgs | ConvertFrom-Json

            if ($blobExists.exists) {
              $dir = Split-Path -Path $localPath -Parent
              if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force | Out-Null }
              $dlArgs = @('storage', 'blob', 'download', '--account-name', $storageAcct, '--container-name', $container, '--name', $blobName, '--file', $localPath, '--auth-mode', 'login')
              az @dlArgs
              Write-Host "  ✓ Downloaded $blobName → $localPath"
            } else {
              Write-Host "  ✗ Blob $blobName not found in container '$container'."
            }
          } else {
            Write-Host "  ✗ Storage account $storageAcct not found."
          }
        }
