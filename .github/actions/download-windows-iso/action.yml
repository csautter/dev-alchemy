name: 'Download Windows ISO from Azure Blob Storage'
description: 'Downloads Windows ISO from Azure Blob Storage if it exists, otherwise allows fallback to Microsoft download - Works on Windows, macOS, and Linux'

inputs:
  iso-path:
    description: 'Path where the ISO should be downloaded'
    required: true
  subscription-id:
    description: 'Azure subscription ID'
    required: true

runs:
  using: "composite"
  steps:
    - name: Download Windows ISO from Azure Blob Storage (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      continue-on-error: true
      run: |
        $isoPath = "${{ inputs.iso-path }}"
        
        if (Test-Path $isoPath) {
          Write-Host "Windows ISO already exists at $isoPath, skipping download"
        } else {
          Write-Host "Windows ISO not found locally, attempting to download from Azure Blob Storage..."
          
          $storageAccountName = ("ghrunner${{ inputs.subscription-id }}" -replace '-', '').Substring(0, 24)
          $resourceGroup = "gh-runner-storage-rg"
          $containerName = "windows-isos"
          $blobName = Split-Path -Leaf "${{ inputs.iso-path }}"
          
          # Check if storage account exists
          $sa = az storage account show --name $storageAccountName --resource-group $resourceGroup 2>$null | ConvertFrom-Json
          
          if ($sa) {
            # Check if blob exists
            $blobExists = az storage blob exists `
              --account-name $storageAccountName `
              --container-name $containerName `
              --name $blobName `
              --auth-mode login | ConvertFrom-Json
            
            if ($blobExists.exists) {
              Write-Host "Found Windows ISO in blob storage, downloading..."
              
              # Create directory if it doesn't exist
              $isoDir = Split-Path -Path $isoPath -Parent
              if (-not (Test-Path $isoDir)) {
                New-Item -ItemType Directory -Path $isoDir -Force
              }
              
              # Download the blob
              az storage blob download `
                --account-name $storageAccountName `
                --container-name $containerName `
                --name $blobName `
                --file $isoPath `
                --auth-mode login
              
              Write-Host "Successfully downloaded Windows ISO from Azure Blob Storage"
              # output full path to the downloaded ISO for use in subsequent steps
              Write-Host "Downloaded ISO to path: $isoPath"
              Write-Host "iso-path=$isoPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            } else {
              Write-Host "Windows ISO not found in blob storage, will need to be downloaded from Microsoft"
            }
          } else {
            Write-Host "Storage account does not exist, will need to download ISO from Microsoft"
          }
        }

    - name: Download Windows ISO from Azure Blob Storage (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      continue-on-error: true
      run: |
        iso_path="${{ inputs.iso-path }}"
        
        if [ -f "$iso_path" ]; then
          echo "Windows ISO already exists at $iso_path, skipping download"
        else
          echo "Windows ISO not found locally, attempting to download from Azure Blob Storage..."
          
          # Create storage account name (max 24 chars, lowercase alphanumeric only)
          storage_account_name=$(echo "ghrunner${{ inputs.subscription-id }}" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-24)
          resource_group="gh-runner-storage-rg"
          container_name="windows-isos"
          blob_name=$(basename "$iso_path")
          
          # Check if storage account exists
          if az storage account show --name "$storage_account_name" --resource-group "$resource_group" &>/dev/null; then
            # Check if blob exists
            blob_exists=$(az storage blob exists \
              --account-name "$storage_account_name" \
              --container-name "$container_name" \
              --name "$blob_name" \
              --auth-mode login \
              --query "exists" \
              --output tsv)
            
            if [ "$blob_exists" = "true" ]; then
              echo "Found Windows ISO in blob storage, downloading..."
              
              # Create directory if it doesn't exist
              iso_dir=$(dirname "$iso_path")
              mkdir -p "$iso_dir"
              
              # Download the blob
              az storage blob download \
                --account-name "$storage_account_name" \
                --container-name "$container_name" \
                --name "$blob_name" \
                --file "$iso_path" \
                --auth-mode login
              
              echo "Successfully downloaded Windows ISO from Azure Blob Storage"
              # output full path to the downloaded ISO for use in subsequent steps
              echo "Downloaded ISO to path: $iso_path"
              echo "iso-path=$iso_path" >> $GITHUB_OUTPUT
            else
              echo "Windows ISO not found in blob storage, will need to be downloaded from Microsoft"
            fi
          else
            echo "Storage account does not exist, will need to download ISO from Microsoft"
          fi
        fi
