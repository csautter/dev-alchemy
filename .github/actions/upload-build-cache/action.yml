name: 'Upload Build Cache Files'
description: >
  For each file in the supplied list, saves it to the local runner shared-volume
  cache (macOS Tart VirtioFS) when applicable, and uploads it to Azure Blob Storage
  when no blob already exists. Works on Windows, macOS, and Linux.

inputs:
  files:
    description: |
      JSON array of cache file descriptors. Each object may contain:
        - local-path  (required) path to the file in the workspace
        - blob-name   (optional) blob key in Azure Storage; defaults to basename of local-path
        - container   (optional) Azure Blob container name; defaults to "build-cache"
      Pass '[]' to skip all cache operations (e.g. for builds with no cached files).
    required: true
  subscription-id:
    description: 'Azure subscription ID used to derive the storage account name'
    required: true
  local-cache-dir:
    description: >
      Path to the local runner shared-volume cache directory (macOS Tart VirtioFS).
      Leave empty to disable local cache write-back.
    required: false
    default: '/Volumes/My Shared Files/build-cache'

runs:
  using: "composite"
  steps:
    - name: Upload build cache files (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      env:
        CACHE_FILES: ${{ inputs.files }}
        SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
        LOCAL_CACHE_DIR: ${{ inputs.local-cache-dir }}
      run: bash "${{ github.action_path }}/scripts/upload-build-cache.sh"

    - name: Upload build cache files (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      env:
        CACHE_FILES: ${{ inputs.files }}
        SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
      run: |
        & "${{ github.action_path }}\scripts\upload-build-cache.ps1"
