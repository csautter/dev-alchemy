name: 'Upload Windows ISO to Azure Blob Storage (Bash)'
description: 'Creates Azure Blob Storage and uploads Windows ISO if it exists - for macOS and Linux runners'

inputs:
  iso-path:
    description: 'Path to the Windows ISO file'
    required: true
  subscription-id:
    description: 'Azure subscription ID'
    required: true

runs:
  using: "composite"
  steps:
    - name: Create storage account and upload Windows ISO
      shell: bash
      run: |
        iso_path="${{ inputs.iso-path }}"
        
        if [ -f "$iso_path" ]; then
          echo "Windows ISO found at $iso_path"
          
          # Create storage account name (max 24 chars, lowercase alphanumeric only)
          storage_account_name=$(echo "ghrunner${{ inputs.subscription-id }}" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-24)
          echo "Using storage account name: $storage_account_name"
          resource_group="gh-runner-storage-rg"
          echo "Using resource group: $resource_group"
          location="eastus2"
          echo "Using location: $location"
          container_name="windows-isos"
          echo "Using container name: $container_name"
          blob_name=$(basename "$iso_path")
          echo "Using blob name: $blob_name"
          
          # Upload ISO to blob storage
          echo "Uploading Windows ISO to blob storage..."
          az storage blob upload \
            --account-name "$storage_account_name" \
            --container-name "$container_name" \
            --name "$blob_name" \
            --file "$iso_path" \
            --auth-mode login \
            --overwrite true
          
          echo "Successfully uploaded Windows ISO to Azure Blob Storage"
        else
          echo "Windows ISO not found at $iso_path, skipping upload"
        fi
