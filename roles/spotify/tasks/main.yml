---
# roles/spotify/tasks/main.yml

- name: Install Spotify on macOS
  homebrew:
    name: spotify
    state: present
    install_options: cask
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install Spotify on Debian/Ubuntu via APT (with auto snap fallback)
  block:
    - name: Install Spotify via APT
      ansible.builtin.include_tasks: debian_apt.yml
  rescue:
    - name: Install Spotify via snap fallback
      ansible.builtin.include_tasks: debian_snap.yml
      when: spotify_linux_package_type == 'auto'
    - name: Fail when APT install fails and fallback is disabled
      ansible.builtin.fail:
        msg: "Spotify APT installation failed and spotify_linux_package_type={{ spotify_linux_package_type }} does not allow automatic snap fallback."
      when: spotify_linux_package_type != 'auto'
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture in spotify_linux_supported_architectures
    - not ansible_check_mode
    - spotify_linux_package_type in ['auto', 'apt']

- name: Install Spotify on Debian/Ubuntu via snap
  ansible.builtin.include_tasks: debian_snap.yml
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture in spotify_linux_supported_architectures
    - not ansible_check_mode
    - spotify_linux_package_type == 'snap'

- name: Skip Spotify install in check mode (Debian/Ubuntu)
  ansible.builtin.debug:
    msg: "Skipping Spotify installation in check mode."
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture in spotify_linux_supported_architectures
    - ansible_check_mode

- name: Log warning for unsupported Linux architecture
  ansible.builtin.debug:
    msg: "Spotify installation on Debian is only supported for x86_64/amd64."
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture not in spotify_linux_supported_architectures

- name: Log warning for unsupported platforms
  ansible.builtin.debug:
    msg: "Spotify installation is not supported on this OS."
  when: ansible_facts['os_family'] not in ['Debian', 'Darwin']
