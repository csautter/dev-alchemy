---
- name: Ensure required packages for kubelogin installation
  apt:
    name:
      - unzip
    state: present
    update_cache: yes
  become: true
  when: not ansible_check_mode

- name: Get latest kubelogin release info from GitHub
  uri:
    url: "{{ kubelogin_release_api_url }}"
    headers: >-
      {{
        {
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
        | combine(
            (kubelogin_github_token | length > 0)
            | ternary({'Authorization': 'Bearer ' ~ kubelogin_github_token}, {})
          )
      }}
    return_content: yes
  register: kubelogin_release
  when:
    - not ansible_check_mode
    - kubelogin_version | length == 0

- name: Set kubelogin version fact
  set_fact:
    kubelogin_resolved_version: >-
      {{
        kubelogin_version
        if kubelogin_version | length > 0
        else kubelogin_release.json.tag_name
      }}
  when: not ansible_check_mode

- name: Set kubelogin download URL
  set_fact:
    kubelogin_url: >-
      {{
        kubelogin_release_base_url
      }}/{{ kubelogin_resolved_version }}/kubelogin_linux_{{ kubelogin_architecture_map[ansible_architecture] }}.zip
  when:
    - not ansible_check_mode
    - ansible_architecture in kubelogin_architecture_map

- name: Fail for unsupported kubelogin architecture
  fail:
    msg: "Unsupported architecture for kubelogin: {{ ansible_architecture }}"
  when:
    - not ansible_check_mode
    - ansible_architecture not in kubelogin_architecture_map

- name: Create temporary directory for kubelogin
  tempfile:
    state: directory
    suffix: kubelogin
  register: kubelogin_tmp
  when: not ansible_check_mode

- name: Download kubelogin binary
  get_url:
    url: "{{ kubelogin_url }}"
    dest: "{{ kubelogin_tmp.path }}/kubelogin.zip"
    mode: '0644'
  when: not ansible_check_mode

- name: Unarchive kubelogin
  unarchive:
    src: "{{ kubelogin_tmp.path }}/kubelogin.zip"
    dest: "{{ kubelogin_tmp.path }}"
    remote_src: yes
  when: not ansible_check_mode

- name: Install kubelogin binary
  copy:
    src: "{{ kubelogin_tmp.path }}/kubelogin"
    dest: /usr/local/bin/kubelogin
    mode: '0755'
    remote_src: yes
  become: true
  when: not ansible_check_mode

- name: Clean up temporary directory
  file:
    path: "{{ kubelogin_tmp.path }}"
    state: absent
  when: not ansible_check_mode

- name: Skip kubelogin installation in check mode
  debug:
    msg: "Skipping kubelogin installation in check mode."
  when: ansible_check_mode
