all:
  hosts:
    windows_host:
      ansible_host: 127.0.0.1
      # `alchemy provision local --proto ssh` injects temporary SSH user, key,
      # and shell settings at runtime. Direct ansible-playbook use should pass
      # your own secure SSH variables explicitly. See
      # docs/windows-ansible-access.md for the manual setup flow, or use
      # `alchemy provision local --proto ssh` for localhost runs.
      ansible_connection: ssh
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o ControlMaster=no -o ControlPersist=no"
      ansible_ssh_timeout: 120 # timeout in seconds
      ansible_ssh_retries: 3
      ansible_shell_type: powershell
      ansible_shell_executable: powershell.exe
