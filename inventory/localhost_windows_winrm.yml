all:
  hosts:
    windows_host:
      ansible_host: 127.0.0.1
      # `alchemy provision local` injects temporary WinRM credentials and
      # transport settings at runtime. Direct ansible-playbook use should pass
      # the required WinRM variables explicitly.
      
      # example:
      # ansible_user: ansible
      # passwords should not be hardcoded, this is just for testing
      # ansible_password: Secret123!@#
      # ansible_connection: winrm
      # ansible_winrm_transport: basic
      # ansible_port: 5985
